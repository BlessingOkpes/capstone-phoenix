# Replace blessingokpenihwo2001@gmail.com with your REAL email — Let's Encrypt rejects
# example.com addresses and you won't get a certificate.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: blessingokpenihwo2001@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
