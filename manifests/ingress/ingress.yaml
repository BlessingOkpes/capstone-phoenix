# Replace taskapp.44.192.62.66.nip.io below with your actual nip.io domain, e.g.
# taskapp.44.192.62.66.nip.io (from your Terraform output `nip_io_domain`)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - taskapp.44.192.62.66.nip.io
      secretName: taskapp-tls
  rules:
    - host: taskapp.44.192.62.66.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
