---
- name: Ensure ubuntu user has passwordless sudo (already default on Ubuntu AMI, confirmed here)
  lineinfile:
    path: /etc/sudoers.d/90-cloud-init-users
    line: "ubuntu ALL=(ALL) NOPASSWD:ALL"
    create: true
    validate: "visudo -cf %s"

- name: Disable SSH password authentication (keys only)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: restart sshd

- name: Disable SSH root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin no"
  notify: restart sshd

- name: Install ufw and fail2ban
  apt:
    name:
      - ufw
      - fail2ban
    state: present
    update_cache: true

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP/HTTPS through ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

- name: Allow k3s API (6443) through ufw
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Allow kubelet (10250) through ufw
  community.general.ufw:
    rule: allow
    port: "10250"
    proto: tcp

- name: Allow flannel VXLAN (8472/udp) through ufw
  community.general.ufw:
    rule: allow
    port: "8472"
    proto: udp

- name: Enable ufw
  community.general.ufw:
    state: enabled
    policy: deny

- name: Ensure fail2ban is running
  systemd:
    name: fail2ban
    state: started
    enabled: true

- name: Flush handlers now so SSH restarts before we lose connection context
  meta: flush_handlers
