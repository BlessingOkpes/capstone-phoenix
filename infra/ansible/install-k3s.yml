---
- name: Base hardening on all nodes
  hosts: k3s_cluster
  become: true
  pre_tasks:
    - name: Wait for SSH / cloud-init to finish
      wait_for_connection:
        timeout: 180
    - name: Update apt cache
      apt:
        update_cache: true
      retries: 5
      delay: 10
  roles:
    - base-hardening

- name: Install k3s server
  hosts: k3s_server
  become: true
  roles:
    - k3s-server

- name: Join k3s agents
  hosts: k3s_agents
  become: true
  vars:
    server_private_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] }}"
    join_token: "{{ hostvars[groups['k3s_server'][0]]['k3s_join_token'] }}"
  roles:
    - k3s-agent
